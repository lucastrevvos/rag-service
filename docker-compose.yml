services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  rag-api:
    build: .
    ports:
      - "3333:3333"
    env_file:
      - .env
    depends_on:
      - redis
    command: ["node", "dist/server.js"]
    restart: unless-stopped

  rag-worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: ["node", "dist/worker.bullmq.js"]
    restart: unless-stopped
